name: vaultly

x-api-base: &api-base
  build:
    context: ./apps/api
    dockerfile: ../../infra/docker/api.Dockerfile
  env_file: .env
  environment:
    DATABASE_URL: postgresql+asyncpg://vaultly:vaultly@postgres:5432/vaultly
    REDIS_URL: redis://redis:6379/0
    S3_ENDPOINT_URL: http://minio:9000
    SMTP_HOST: mailpit
  volumes:
    - ./apps/api:/app
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vaultly
      POSTGRES_PASSWORD: vaultly
      POSTGRES_DB: vaultly
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultly"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: vaultly
      MINIO_ROOT_PASSWORD: vaultly-local
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 vaultly vaultly-local &&
      mc mb --ignore-existing local/vaultly-documents
      "

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025" # web UI — every reminder email lands here locally
      - "1025:1025" # SMTP

  api:
    <<: *api-base
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"

  worker:
    <<: *api-base
    command: celery -A app.worker.celery_app worker --loglevel INFO

  beat:
    <<: *api-base
    command: celery -A app.worker.celery_app beat --loglevel INFO

  web:
    build:
      context: ./apps/web
      dockerfile: ../../infra/docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_URL_INTERNAL: http://api:8000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
